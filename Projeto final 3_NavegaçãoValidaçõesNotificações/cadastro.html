<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Cadastro</h1>

    <div id="notificacao" class="notificacao"></div>

    <form id="form-cadastro">

      <input 
        type="text" 
        id="nome" 
        placeholder="Nome completo"
      >

      <input 
        type="email" 
        id="email-cadastro" 
        placeholder="E-mail"
      >

      <input 
        type="password" 
        id="senha-cadastro" 
        placeholder="Senha"
      >

      <button type="submit">Cadastrar</button>

    </form>

    <p>
      Já tem conta?
      <a href="index.html">Voltar para login</a>
    </p>

  </div>

  <script src="cadastro.js"></script>
</body>
</html>
